<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>夢幻成真 — Field of Dreams</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 標題畫面 -->
  <div id="title-screen">
    <div id="title-content">
      <div class="title-voice">"If you build it, he will come."</div>
      <h1>夢幻成真</h1>
      <div class="title-sub">Field of Dreams</div>
      <button id="continue-btn" style="display:none">繼續遊戲</button>
      <button id="start-btn">開始遊戲</button>
      <div id="save-info" style="display:none"></div>
      <button id="practice-btn">⚾ 練習打擊</button>
      <button id="history-btn" style="display:none">歷史紀錄</button>
      <div class="title-hint">改編自 1989 年電影《夢幻成真》</div>
    </div>
  </div>

  <!-- 主遊戲畫面 -->
  <div id="game" style="display:none">
    <div id="bg"></div>

    <!-- 角色立繪 -->
    <div id="character-portrait" style="display:none">
      <img id="char-img" src="" alt="" style="display:none">
      <div id="char-placeholder"></div>
      <div id="char-label"></div>
    </div>

    <div id="hud">
      <div class="hud-item">💵 $<span id="money">50,000</span></div>
      <div class="hud-item">📅 +<span id="days">0</span> 天</div>
    </div>
    <div id="dialogue-box">
      <div id="speaker-name"></div>
      <div id="dialogue-text"></div>
      <div id="choices"></div>
      <div id="click-hint">▼ 點擊繼續</div>
    </div>
  </div>

  <!-- 練習打擊選擇 Modal -->
  <div id="practice-modal" style="display:none">
    <div id="practice-content">
      <div class="practice-title">⚾ 練習打擊</div>

      <div class="practice-label">選擇對手投手</div>
      <div class="practice-row" id="practice-pitchers">
        <button class="practice-option selected" data-group="pitcher" data-key="joe">
          <span class="popt-name">Shoeless Joe</span>
          <span class="popt-sub">穩定直球</span>
        </button>
        <button class="practice-option" data-group="pitcher" data-key="archie_young">
          <span class="popt-name">Moonlight Graham</span>
          <span class="popt-sub">多樣球路</span>
        </button>
        <button class="practice-option" data-group="pitcher" data-key="john">
          <span class="popt-name">John Kinsella</span>
          <span class="popt-sub">速球挑戰</span>
        </button>
      </div>

      <div class="practice-label">選擇難度</div>
      <div class="practice-row" id="practice-difficulties">
        <button class="practice-option" data-group="difficulty" data-key="easy">
          <span class="popt-name">簡單</span>
          <span class="popt-sub">球速慢，壞球多</span>
        </button>
        <button class="practice-option selected" data-group="difficulty" data-key="normal">
          <span class="popt-name">普通</span>
          <span class="popt-sub">接近故事難度</span>
        </button>
        <button class="practice-option" data-group="difficulty" data-key="hard">
          <span class="popt-name">困難</span>
          <span class="popt-sub">球速快，好球多</span>
        </button>
      </div>

      <div class="practice-actions">
        <button id="practice-start-btn">開始練習</button>
        <button id="practice-cancel-btn">取消</button>
      </div>
    </div>
  </div>

  <!-- 練習結果畫面 -->
  <div id="practice-result" style="display:none">
    <div id="practice-result-content">
      <div id="practice-result-icon"></div>
      <div id="practice-result-text"></div>
      <div class="practice-result-actions">
        <button id="practice-retry-btn">再練一次</button>
        <button id="practice-home-btn">回首頁</button>
      </div>
    </div>
  </div>

  <!-- 歷史紀錄 Modal -->
  <div id="history-modal" style="display:none">
    <div id="history-content">
      <div id="history-title">歷史紀錄</div>
      <div id="history-list"></div>
      <button id="history-close">關閉</button>
    </div>
  </div>

  <!-- Canvas 小遊戲層 -->
  <canvas id="minigame-canvas" style="display:none"></canvas>

  <!-- 結局畫面 -->
  <div id="ending-screen" style="display:none">
    <div id="ending-content"></div>
  </div>

  <script src="js/story.js?v=2"></script>
  <script src="js/state.js?v=2"></script>
  <script src="js/minigame.js?v=2"></script>
  <script src="js/engine.js?v=2"></script>
</body>
</html>
